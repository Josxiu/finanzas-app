// ------------------------------------------------ Formato colombiano
/** 44404 -> "44.404" ; 44404.5 -> "44.404,50" (sin el signo $). */
function montoATexto(n) {
  var opciones = (Math.round(n * 100) % 100 === 0)
    ? { maximumFractionDigits: 0 }
    : { minimumFractionDigits: 2, maximumFractionDigits: 2 };
  return Number(n).toLocaleString('es-CO', opciones);
}
/* ---------- Dinero (v9): una sola capa de formato -----------------------
   Dos casos, según de dónde viene el número:
     fmtBase(nCOP): monto CONSOLIDADO (el backend lo da en COP). Se muestra en
       la moneda base dividiendo por su tasa. Lo usan patrimonio, resúmenes,
       tablas y gráficas.
     fmtNativo(n, moneda): monto en SU moneda (saldo de una cuenta, valor de un
       movimiento). Se muestra tal cual, con su código si no es la base.
   `conCodigo` añade el código de moneda en gris (solo en lugares clave). */
var monedaBase = 'COP';

var INFO_MONEDA = {
  COP: { simbolo: '$', dec: 0 }, USD: { simbolo: 'US$', dec: 2 }, EUR: { simbolo: '€', dec: 2 },
  GBP: { simbolo: '£', dec: 2 }, BRL: { simbolo: 'R$', dec: 2 }, MXN: { simbolo: 'MX$', dec: 2 },
  ARS: { simbolo: 'AR$', dec: 2 }, CLP: { simbolo: '$', dec: 0 }, PEN: { simbolo: 'S/', dec: 2 },
  CAD: { simbolo: 'CA$', dec: 2 }, CHF: { simbolo: 'CHF', dec: 2 }, JPY: { simbolo: '¥', dec: 0 }
};
function infoMoneda(m) { return INFO_MONEDA[m] || { simbolo: (m || '') + ' ', dec: 2 }; }
function simboloDe(moneda) { return infoMoneda(moneda).simbolo; }

/** Número con miles es-CO. dec=0 = enteros salvo que haya centavos reales. */
function numeroMoneda(n, dec) {
  if (dec === 0) {
    return (Math.round(n * 100) % 100 === 0)
      ? Number(n).toLocaleString('es-CO', { maximumFractionDigits: 0 })
      : Number(n).toLocaleString('es-CO', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  return Number(n).toLocaleString('es-CO', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}

/** El código de moneda en gris pequeño (para las cifras clave). */
function conCodigoBase(txt, moneda) {
  return txt + '<span class="cod-moneda">' + moneda + '</span>';
}

/** Monto en su propia moneda. `conCodigo`: HTML con el código (solo si ≠ base). */
function fmtNativo(n, moneda, conCodigo) {
  moneda = moneda || 'COP';
  var inf = infoMoneda(moneda);
  var txt = inf.simbolo + ' ' + numeroMoneda(n, inf.dec);
  if (conCodigo === 'html') return conCodigoBase(txt, moneda); // siempre el código, en HTML
  if (conCodigo && moneda !== monedaBase) txt += ' ' + moneda;
  return txt;
}

/** Tasa de la moneda base a COP (1 si es COP, o si la base perdió su tasa). */
function tasaBase() {
  if (monedaBase === 'COP') return 1;
  var t = (datos && datos.tasas || {})[monedaBase];
  return (t && t.tasa > 0) ? t.tasa : 1;
}

/** Monto consolidado (en COP) mostrado en la moneda base. */
function fmtBase(nCOP, conCodigo) {
  return fmtNativo(nCOP / tasaBase(), monedaBase, conCodigo);
}
function cuentaPorNombre(n) {
  return datos ? (datos.cuentas.filter(function (c) { return c.cuenta === n; })[0] || null) : null;
}

/**
 * Texto del equivalente en la MONEDA BASE de una cuenta que está en otra moneda.
 * Respeta el mismo signo que la línea principal: una deuda se muestra en
 * positivo ("debes"), así que su equivalente también (si no, salía "≈ $ -80.000").
 * Devuelve '' si la cuenta ya está en la base, y avisa si no hay tasa.
 */
function textoEquivalente(c, conTasa) {
  if (c.moneda === monedaBase) return '';
  // Solo las monedas foráneas (no COP) tienen tasa propia que pueda faltar
  var t = (datos.tasas || {})[c.moneda] || {};
  if (c.moneda !== 'COP' && (t.sinTasa || !(t.tasa > 0))) {
    return '⚠ Sin tasa de ' + c.moneda + ': no está sumando al patrimonio (pon una tasa manual en Ajustes)';
  }
  var esDeudaEnRojo = (c.tipo === 'Deuda' && c.saldo <= 0);
  var valorCOP = esDeudaEnRojo ? -c.saldoCOP : c.saldoCOP;
  var txt = '≈ ' + fmtBase(Math.round(valorCOP));
  // La tasa se expresa en la base: 1 [moneda] = [base] (rate/tasaBase)
  if (conTasa && c.moneda !== 'COP') {
    txt += ' · 1 ' + c.moneda + ' = ' + fmtNativo(t.tasa / tasaBase(), monedaBase);
    if (t.esManual) txt += ' (tasa manual)';
  }
  return txt;
}
/** Moneda de una cuenta por nombre ('COP' si no está). */
function monedaDe(nombre) {
  var c = cuentaPorNombre(nombre);
  return c ? (c.moneda || 'COP') : 'COP';
}
/** Tasa a COP de una cuenta (1 para COP). */
function tasaDe(nombre) {
  var c = cuentaPorNombre(nombre);
  return c && c.tasa !== undefined ? c.tasa : 1;
}
/** '#RRGGBB' + alfa -> 'rgba(r,g,b,a)' (para degradados de las gráficas). */
function hexA(hex, a) {
  var r = parseInt(hex.substring(1, 3), 16), g = parseInt(hex.substring(3, 5), 16), b = parseInt(hex.substring(5, 7), 16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
}

/* Convierte lo escrito en el campo de monto a Number.
   Acepta "12500", "12.500", "12500,50", "12.500,50" y negativos. */
function parsearMonto(txt) {
  var s = String(txt).trim().replace(/\$|\s/g, '');
  if (s.indexOf(',') >= 0) s = s.replace(/\./g, '').replace(',', '.');
  else if (/^-?\d{1,3}(\.\d{3})+$/.test(s)) s = s.replace(/\./g, ''); // solo puntos de miles
  return parseFloat(s);
}

/* Formatea el campo mientras se escribe (44404 -> 44.404) para que un dedazo
   de un dígito salte a la vista. Conserva la posición del cursor contando los
   dígitos que quedaban a su izquierda. */
function formatearMontoEnVivo(inp, permitirNegativo) {
  var txt = inp.value;
  var pos = inp.selectionStart;
  // El ancla cuenta dígitos Y la coma decimal: contar solo dígitos dejaría el
  // cursor antes de la coma al escribirla, y el decimal siguiente entraría mal.
  var sigAntes = (txt.slice(0, pos).match(/[\d,]/g) || []).length;

  var negativo = permitirNegativo && txt.trim().charAt(0) === '-';
  var limpio = txt.replace(/[^\d,]/g, '');          // fuera los puntos de miles viejos
  var partes = limpio.split(',');
  var enteros = partes[0].replace(/^0+(?=\d)/, ''); // sin ceros a la izquierda
  var decimales = partes.length > 1 ? partes.slice(1).join('').substring(0, 2) : null;

  var salida = enteros ? Number(enteros).toLocaleString('es-CO') : '';
  if (decimales !== null) salida = (salida || '0') + ',' + decimales;
  if (negativo && (salida || txt.trim() === '-')) salida = '-' + salida;
  inp.value = salida;

  // Devolver el cursor a donde estaba, medido en esos mismos caracteres
  var nuevaPos = salida.length, vistos = 0;
  if (sigAntes === 0) {
    nuevaPos = negativo ? 1 : 0;
  } else {
    for (var i = 0; i < salida.length; i++) {
      if (/[\d,]/.test(salida.charAt(i)) && ++vistos === sigAntes) { nuevaPos = i + 1; break; }
    }
  }
  inp.setSelectionRange(nuevaPos, nuevaPos);
}

var MESES = ['ene', 'feb', 'mar', 'abr', 'may', 'jun', 'jul', 'ago', 'sep', 'oct', 'nov', 'dic'];
function nombreMes(yyyymm) {
  var p = yyyymm.split('-');
  return MESES[Number(p[1]) - 1] + ' ' + p[0];
}
function fechaBonita(iso) {
  var hoy = datos ? datos.hoy : '';
  if (iso === hoy) return 'Hoy';
  var p = iso.split('-');
  var ayer = new Date(Number(p[0]), Number(p[1]) - 1, Number(p[2]) + 1, 12);
  var d = new Date(Number(p[0]), Number(p[1]) - 1, Number(p[2]), 12);
  if (hoy && Utilities_fmt(ayer) === hoy) return 'Ayer';
  var dias = ['dom', 'lun', 'mar', 'mié', 'jue', 'vie', 'sáb'];
  return dias[d.getDay()] + ' ' + Number(p[2]) + ' ' + MESES[Number(p[1]) - 1];
}
function Utilities_fmt(d) { // yyyy-mm-dd de un Date local
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

// ------------------------------------------------ Toast y carga
var toastTimer = null;
function toast(msg, tipo) {
  var t = $('toast');
  t.textContent = msg;
  t.className = 'toast ' + (tipo || '');
  t.hidden = false;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function () { t.hidden = true; }, 3200);
}
function cargando(v) { $('cargando').style.display = v ? 'flex' : 'none'; }

// ------------------------------------------------ Comunicación con Apps Script
var MENSAJES_OK = {
  agregarMovimiento: 'Movimiento guardado',
  editarMovimiento: 'Cambios guardados',
  borrarMovimiento: 'Movimiento borrado',
  ajustarSaldo: 'Cuenta cuadrada',
  editarCuenta: 'Saldo inicial actualizado',
  ajustarInicioMes: 'Inicio de mes ajustado',
  agregarCuenta: 'Cuenta creada',
  eliminarCuenta: 'Cuenta eliminada',
  agregarCategoria: 'Categoría creada',
  eliminarCategoria: 'Categoría eliminada',
  editarCategoria: 'Categoría actualizada',
  reordenarCuentas: 'Orden guardado',
  guardarPresupuesto: 'Presupuestos actualizados'
};

/** SVG de un icono del sprite (para armar botones por JS). */
function icono(nombre, mini) {
  return '<svg class="ic' + (mini ? ' ic-mini' : '') + '"><use href="#i-' + nombre + '"/></svg>';
}

/** Cuentas separadas por tipo (las deudas viven aparte en el Panel). */
function cuentasActivas() { return datos.cuentas.filter(function (c) { return c.tipo !== 'Deuda'; }); }
function cuentasDeuda() { return datos.cuentas.filter(function (c) { return c.tipo === 'Deuda'; }); }

/* `args` es siempre un array. `alTerminar(ok)` corre tanto si funcionó como si
   falló: quien llama decide qué limpiar o rehabilitar según el resultado. */
function llamar(fn, args, alTerminar) {
  cargando(true);
  var r = google.script.run
    .withSuccessHandler(function (resp) {
      datos = resp;
      cargando(false);
      renderTodo();
      if (MENSAJES_OK[fn]) toast(MENSAJES_OK[fn], 'exito');
      if (alTerminar) alTerminar(true);
    })
    .withFailureHandler(function (err) {
      cargando(false);
      toast(err && err.message ? err.message : 'Error de conexión', 'error');
      if (alTerminar) alTerminar(false);
    });
  r[fn].apply(r, args);
}
function cargarDatos(silencioso) {
  if (!silencioso) cargando(true);
  google.script.run
    .withSuccessHandler(function (resp) { datos = resp; cargando(false); renderTodo(); })
    .withFailureHandler(function (err) {
      cargando(false);
      toast(err && err.message ? err.message : 'No pude cargar los datos', 'error');
    })
    .getDatos();
}

// ------------------------------------------------ Esqueletos de carga inicial
/* En la PRIMERA carga no hay velo: se pintan bloques con brillo donde irán las
   cifras y tarjetas (nada de saltos). El velo queda para las acciones. */
