/** Lista de categorías: tocar abre el editor (renombrar, emoji, ocultar, eliminar). */
function renderAjustesCats() {
  var cont = $('aj-cats-lista');
  cont.innerHTML = '';
  var ocultas = datos.catsOcultas || [];
  datos.categorias.forEach(function (c) {
    var esOculta = ocultas.indexOf(c.categoria) >= 0;
    var it = document.createElement('button');
    it.type = 'button'; it.className = 'aj-item' + (esOculta ? ' oculta' : '');
    var em = document.createElement('span');
    em.className = 'ai-emoji'; em.textContent = c.icono || '🏷️';
    var txt = document.createElement('span');
    txt.className = 'ai-txt';
    var nom = document.createElement('b'); nom.textContent = c.categoria;
    var sub = document.createElement('span');
    sub.className = 'ai-saldo';
    sub.textContent = (c.tipoSugerido ? c.tipoSugerido : 'sin tipo') + (esOculta ? ' · oculta' : '');
    txt.appendChild(nom); txt.appendChild(sub);
    var chev = document.createElement('span');
    chev.innerHTML = icono('lapiz');
    it.appendChild(em); it.appendChild(txt); it.appendChild(chev);
    it.onclick = function () { abrirCatEditor(c); };
    cont.appendChild(it);
  });
}

// ============================================================ NAVEGACIÓN
/* Vistas de nav (barra/sidebar): resumen, meses, historial, ajustes. Registrar
   y cuenta son SUBVISTAS: se abren por hash (#registrar, #cuenta/Nombre), y el
   botón atrás del navegador las cierra volviendo a `vistaBase`. */
var TITULOS = { registrar: 'Registrar', resumen: 'Panel', meses: 'Evolución', historial: 'Historial', ajustes: 'Ajustes', cuenta: 'Cuenta' };
var vistaActual = 'resumen';
var vistaBase = 'resumen'; // última vista de nav; a ella vuelve el back de una subvista

function irA(vista) {
  var esSubvista = (vista === 'cuenta' || vista === 'registrar');
  // Ir a una vista de nav: recordarla como base y soltar la subvista (limpia el hash)
  if (!esSubvista) {
    vistaBase = vista;
    cuentaDetalle = null;
    if (location.hash) history.replaceState(null, '', location.pathname + location.search);
  }
  vistaActual = vista;
  document.querySelectorAll('.vista').forEach(function (v) { v.classList.remove('activa'); });
  $('vista-' + vista).classList.add('activa');
  // La subvista de cuenta cuelga del Panel; Registrar no marca ninguna pestaña
  var navVista = vista === 'cuenta' ? 'resumen' : vista;
  document.querySelectorAll('.nav-btn').forEach(function (b) {
    b.classList.toggle('activa', b.dataset.vista === navVista);
  });
  // En Registrar el FAB se esconde en móvil (el CTA es Guardar)
  document.body.classList.toggle('en-registrar', vista === 'registrar');
  $('titulo-vista').textContent = TITULOS[vista];
  window.scrollTo(0, 0);
  // Los canvas ocultos se dibujan mal: redibujar al mostrar su vista
  if (vista === 'resumen') renderGraficas();
  if (vista === 'meses') renderEvolucion();
  if (vista === 'cuenta') renderCuentaDetalle();
  if (vista === 'ajustes') renderAjustes();
}

/** Abre Registrar (subvista por hash). Opcionalmente preselecciona el origen. */
function abrirRegistrar(cuentaOrigen) {
  if (cuentaOrigen) { cuentaSel = cuentaOrigen; destinoSel = ''; }
  renderChipsRegistrar(); // reflejar la preselección antes de mostrar la vista
  location.hash = '#registrar';
}
/** Cierra Registrar. Intenta volver por el historial (deja el botón atrás del
    navegador consistente), pero si el back no cierra la vista —pasa a ratos
    dentro del iframe de Apps Script— fuerza la vuelta a la base como respaldo. */
function cerrarRegistrar() {
  if (location.hash === '#registrar') {
    history.back();
    setTimeout(function () { if (vistaActual === 'registrar') irA(vistaBase); }, 120);
  } else {
    irA(vistaBase);
  }
}

// ============================================================ ARRANQUE
document.addEventListener('DOMContentLoaded', function () {
  // Tema: lo guardado, o 'auto' (sigue al sistema)
  aplicarTema(localStorage.getItem('tema') || 'auto');
  // En modo 'auto', re-aplicar cuando el sistema cambie de claro/oscuro
  if (window.matchMedia) {
    matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function () {
      if ((localStorage.getItem('tema') || 'auto') === 'auto') aplicarTema('auto');
    });
  }
  document.querySelectorAll('#aj-tema .chip').forEach(function (b) {
    b.onclick = function () { elegirTema(b.dataset.tema); };
  });

  // Fecha de hoy por defecto (zona local del teléfono)
  $('inp-fecha').value = Utilities_fmt(new Date());

  document.querySelectorAll('.btn-tipo').forEach(function (b) {
    b.onclick = function () { elegirTipo(b.dataset.tipo); };
  });
  elegirTipo('Gasto');

  $('btn-guardar').onclick = guardar;
  $('btn-refrescar').onclick = function () { cargarDatos(false); };
  document.querySelectorAll('.nav-btn').forEach(function (b) {
    b.onclick = function () { irA(b.dataset.vista); };
  });
  // Registrar: FAB (móvil) / botón del sidebar (PC), y su botón "Volver"
  $('btn-registrar').onclick = function () { abrirRegistrar(); };
  $('reg-volver').onclick = cerrarRegistrar;

  // Selector visual de transferencia (Origen → Destino con ⇄)
  $('tr-origen').onclick = function () { transferLado = 'origen'; renderChipsRegistrar(); };
  $('tr-destino').onclick = function () { transferLado = 'destino'; renderChipsRegistrar(); };
  $('tr-swap').onclick = function () {
    var t = cuentaSel; cuentaSel = destinoSel; destinoSel = t;
    renderChipsRegistrar();
  };

  // Presupuestos del Panel: desplegar/plegar el resto
  $('presup-vertodos').onclick = function () {
    presupExpandido = !presupExpandido;
    renderPresupuestos();
  };

  ['fil-mes', 'fil-cuenta', 'fil-tipo', 'fil-categoria'].forEach(function (id) {
    $(id).onchange = renderHistorial;
  });

  // Separadores de miles mientras se escribe (el ajuste admite negativos)
  $('inp-monto').addEventListener('input', function () { formatearMontoEnVivo(this, false); });
  $('ed-valor').addEventListener('input', function () { formatearMontoEnVivo(this, false); });
  $('inp-valor-destino').addEventListener('input', function () { formatearMontoEnVivo(this, false); });
  $('ed-valor-destino').addEventListener('input', function () { formatearMontoEnVivo(this, false); });
  $('aj-real').addEventListener('input', function () {
    formatearMontoEnVivo(this, true);
    actualizarDifAjuste();
  });

  $('ed-tipo').onchange = ajustarModalTipo;
  // Cambiar cuenta u origen puede cambiar de moneda: revisar el campo "llega"
  $('ed-cuenta').onchange = ajustarModalTipo;
  $('ed-destino').onchange = ajustarModalTipo;
  $('ed-guardar').onclick = guardarEdicion;
  $('ed-borrar').onclick = borrarEdicion;
  $('ed-cancelar').onclick = cerrarModal;
  $('modal-fondo').onclick = function (e) { if (e.target === this) cerrarModal(); };

  $('aj-guardar').onclick = guardarAjuste;
  $('aj-cancelar').onclick = cerrarAjuste;
  $('modal-ajuste').onclick = function (e) { if (e.target === this) cerrarAjuste(); };

  // Saldo inicial (dentro del modal de cuadre)
  $('si-toggle').onclick = function () { $('si-bloque').hidden = !$('si-bloque').hidden; };
  $('si-valor').addEventListener('input', function () { formatearMontoEnVivo(this, true); });
  $('si-guardar').onclick = guardarSaldoInicial;
  $('si-eliminar').onclick = eliminarCuentaActual;

  // Modal de mes (detalle + ajuste de inicio)
  $('mes-cerrar').onclick = cerrarMes;
  $('modal-mes').onclick = function (e) { if (e.target === this) cerrarMes(); };
  $('mes-ajuste-valor').addEventListener('input', function () {
    formatearMontoEnVivo(this, true);
    actualizarDifMes();
  });
  $('mes-ajuste-guardar').onclick = guardarAjusteMes;

  // Modal de cuenta nueva
  $('nc-cancelar').onclick = cerrarModalCuenta;
  $('modal-cuenta').onclick = function (e) { if (e.target === this) cerrarModalCuenta(); };
  $('nc-saldo').addEventListener('input', function () { formatearMontoEnVivo(this, true); });
  $('nc-guardar').onclick = guardarCuenta;

  // Editor de una categoría (modal-cat): nuevo, guardar, eliminar, cerrar
  $('cat-guardar').onclick = guardarCatEditor;
  $('cat-eliminar').onclick = eliminarCatEditor;
  $('cat-cancelar').onclick = cerrarCatEditor;
  $('modal-cat').onclick = function (e) { if (e.target === this) cerrarCatEditor(); };

  // Ajustes: cuentas y categorías (agregar / ordenar)
  $('aj-add-cuenta').onclick = function () { abrirModalCuenta('Activo'); };
  $('aj-add-deuda').onclick = function () { abrirModalCuenta('Deuda'); };
  $('aj-add-cat').onclick = function () { abrirCatEditor(null); };
  $('aj-ordenar').onclick = function () { irA('resumen'); if (!ordenando) alternarOrden(); };

  // Panel: modo ordenar y tipo de cuenta nueva
  $('btn-ordenar').onclick = alternarOrden;
  document.querySelectorAll('#nc-tipos .chip').forEach(function (b) {
    b.onclick = function () { ncTipoSel = b.dataset.nctipo; pintarTipoCuentaNueva(); };
  });

  // Vista de detalle de cuenta
  window.addEventListener('hashchange', manejarHash);
  $('cd-volver').onclick = function () { history.back(); };
  $('cd-registrar').onclick = function () {
    abrirRegistrar(cuentaDetalle); // preselecciona esta cuenta como origen
  };
  $('cd-conciliar').onclick = function () {
    var c = cuentaPorNombre(cuentaDetalle);
    if (c) abrirAjuste(c);
  };
  $('cd-editar').onclick = function () {
    var c = cuentaPorNombre(cuentaDetalle);
    if (c) { abrirAjuste(c); $('si-bloque').hidden = false; }
  };
  $('cd-ver-todo').onclick = function () {
    var n = cuentaDetalle;
    $('fil-mes').value = '';
    $('fil-tipo').value = '';
    $('fil-categoria').value = '';
    $('fil-buscar').value = '';
    $('fil-cuenta').value = n;
    renderHistorial();
    irA('historial');
  };
  document.querySelectorAll('#cd-rangos .chip').forEach(function (b) {
    b.onclick = function () {
      rangoCuenta = Number(b.dataset.cdrango);
      localStorage.setItem('rangoCuenta', rangoCuenta);
      renderCuentaDetalle();
    };
  });

  // Rango de las gráficas
  document.querySelectorAll('#rango-graficas .chip').forEach(function (b) {
    b.onclick = function () {
      rangoSel = Number(b.dataset.rango);
      localStorage.setItem('rangoGraficas', rangoSel);
      renderGraficas();
    };
  });

  // Rango de la línea grande de Evolución
  document.querySelectorAll('#rango-evol .chip').forEach(function (b) {
    b.onclick = function () {
      rangoEvol = Number(b.dataset.evrango);
      localStorage.setItem('rangoEvol', rangoEvol);
      renderEvolucion();
    };
  });

  // Vistas de las gráficas del Panel (dona/lista, I vs G/neto, mes/día)
  document.querySelectorAll('[data-vbarras]').forEach(function (b) {
    b.onclick = function () {
      vistaBarras = b.dataset.vbarras;
      localStorage.setItem('vistaBarras', vistaBarras);
      renderGraficas();
    };
  });
  $('chip-gran').onclick = function () {
    granBarras = granBarras === 'dia' ? 'mes' : 'dia';
    localStorage.setItem('granBarras', granBarras);
    renderGraficas();
  };
  document.querySelectorAll('[data-vcats]').forEach(function (b) {
    b.onclick = function () {
      vistaCats = b.dataset.vcats;
      localStorage.setItem('vistaCats', vistaCats);
      renderGraficas();
    };
  });

  // Buscador del historial (con 300 movimientos máximo no hace falta debounce)
  $('fil-buscar').addEventListener('input', renderHistorial);

  // Modal de presupuestos
  $('btn-presup').onclick = abrirModalPresup;
  $('pre-cerrar').onclick = cerrarModalPresup;
  $('modal-presup').onclick = function (e) { if (e.target === this) cerrarModalPresup(); };
  $('pre-cat').onchange = precargarTopePresup;
  $('pre-tope').addEventListener('input', function () { formatearMontoEnVivo(this, false); });
  $('pre-guardar').onclick = guardarPresupuestoUI;

  // Escape cierra el modal que esté abierto (en PC ahorra buscar el botón)
  document.addEventListener('keydown', function (e) {
    if (e.key !== 'Escape') return;
    if (!$('modal-fondo').hidden) cerrarModal();
    else if (!$('modal-ajuste').hidden) cerrarAjuste();
    else if (!$('modal-mes').hidden) cerrarMes();
    else if (!$('modal-cuenta').hidden) cerrarModalCuenta();
    else if (!$('modal-cat').hidden) cerrarCatEditor();
    else if (!$('modal-presup').hidden) cerrarModalPresup();
  });

  // Recarga automática al volver a la app (cambio de pestaña / desbloquear el celular)
  document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'visible' && datos) cargarDatos(true);
  });

  // Primera carga: esqueletos en el Panel (sin velo) mientras llega getDatos
  pintarEsqueletos();
  cargarDatos(true);
});
</script>
